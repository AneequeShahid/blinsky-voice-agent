version: '3.8'

services:
  blinsky:
    build: .
    ports:
      - "9001:9001"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data
      - ./output:/app/output
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
