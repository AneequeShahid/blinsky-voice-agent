<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinsky Voice Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="orb"></div>
                <h1>Blinsky</h1>
            </div>
            <div class="status">
                <span class="dot"></span>
                <span id="status-text">Connected</span>
            </div>
        </header>

        <main id="chat-container">
            <div class="message assistant">
                <div class="avatar">B</div>
                <div class="bubble">Hello! I am Blinsky, your local AI voice agent. How can I help you today?</div>
            </div>
        </main>

        <div class="input-area">
            <button id="mic-btn" class="mic-btn" aria-label="Microphone">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
            </button>
            <input type="text" id="message-input" placeholder="Message Blinsky..." autocomplete="off" />
            <button id="send-btn" class="send-btn" aria-label="Send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
