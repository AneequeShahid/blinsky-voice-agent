name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MLFLOW_TRACKING_URI: ./mlruns
      ANONYMIZED_TELEMETRY: "false"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest httpx
      - run: pytest tests/ -v
